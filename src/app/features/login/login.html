<div class="page">
  <main class="login-wrap">
    <div class="card">
      <h1 class="brand">eLearning</h1>
      <p class="subtitle">Sign in to your account</p>

      <form (ngSubmit)="onSubmit()">
        <label class="field">
          <input
            name="username"
            type="text"
            placeholder="Username or Email"
            autocomplete="username"
            [(ngModel)]="username"
          />
        </label>

        <label class="field">
          <input
            name="password"
            type="password"
            placeholder="Password"
            autocomplete="current-password"
            [(ngModel)]="password"
          />
        </label>

        <div class="actions">
          <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">Login</button>
        </div>

        <div class="error" aria-live="polite">{{ errorMessage }}</div>
      </form>

      <div class="help">
        Use <strong>admin_edu&#64;example.com</strong> or <strong>teacher1&#64;example.com</strong> for
        testing.
      </div>
    </div>
  </main>
</div>
